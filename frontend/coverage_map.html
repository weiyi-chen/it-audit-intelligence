<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IT Understanding Map — IT Audit Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f1623;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.nav{background:#141d2e;color:#fff;display:flex;align-items:center;gap:12px;padding:12px 20px;font-size:14px;border-bottom:1px solid #1e2d45;flex-shrink:0}
.nav .logo{font-weight:700;font-size:16px;color:#7eb8f7;text-decoration:none}
.nav .sep{color:#2a3d55}
.nav .badge{background:#1e2d45;border:1px solid #2a3d55;border-radius:4px;padding:2px 8px;font-size:11px;color:#5a7090;margin-left:auto}
.mode-btns{display:flex;gap:6px}
.mode-btn{padding:5px 12px;border-radius:6px;border:1px solid #2a3d55;background:transparent;color:#8098b4;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.mode-btn.active{background:#1e3a6e;border-color:#4a86c8;color:#7eb8f7}
.hint{font-size:11px;color:#3a5070;margin-left:8px}
.main{display:flex;flex:1;overflow:hidden}

/* left panel */
.panel{width:210px;background:#111926;border-right:1px solid #1e2d45;overflow-y:auto;flex-shrink:0;padding:10px 0}
.panel-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#3a5070;padding:0 12px 7px}
.node-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;border-left:3px solid transparent;transition:all .12s;font-size:12.5px;font-weight:500}
.node-item:hover{background:#1a2438}
.node-item.selected{background:#182540;border-left-color:#4a86c8;color:#fff;font-weight:600}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sep{height:1px;background:#1e2d45;margin:7px 12px}

/* canvas */
#network-view{flex:1;position:relative;overflow:hidden}
canvas{position:absolute;top:0;left:0;display:block}

/* matrix */
#matrix-view{flex:1;overflow:auto;padding:24px;display:none}
#matrix-table{border-collapse:collapse;font-size:11.5px}

/* detail */
.detail{width:272px;background:#111926;border-left:1px solid #1e2d45;overflow-y:auto;flex-shrink:0;padding:18px 16px}
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:#2a3d55;font-size:13px;text-align:center}
.detail-name{font-size:16px;font-weight:700;margin-bottom:3px;line-height:1.3}
.detail-type{font-size:11px;color:#4a6080;margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}
.dlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#3a5570;margin-bottom:7px}
.chip-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.chip{padding:3px 9px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;transition:background .12s}
.chip-d{background:#1a2d48;color:#7eb8f7;border:1px solid #2a3d60}
.chip-d:hover{background:#1e3a6e}
.chip-p{background:#1a2438;color:#94b8d8;border:1px solid #2a3450}
.chip-p:hover{background:#1e2d48}
.reminder{display:flex;gap:8px;align-items:flex-start;padding:8px 10px;background:#141d2e;border-radius:6px;margin-bottom:7px;font-size:12px;line-height:1.55;border-left:3px solid #374151}
.reminder.rc{border-left-color:#f59e0b}
.reminder.ra{border-left-color:#10b981}
.reminder.rr{border-left-color:#ef4444}
.r-icon{flex-shrink:0;font-size:13px;margin-top:1px}
</style>

// ── Canvas network ────────────────────────────────────────────────────────────
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
let W,H,nodes=[],selectedId=null,mode="network";
const PR=28,DR=22;

function initNodes(){
  nodes=[];
  const cx=W/2,cy=H/2,pr=Math.min(W,H)*.32,dr=Math.min(W,H)*.155;
  PERSONS.forEach((p,i)=>{
    const a=(i/PERSONS.length)*Math.PI*2-Math.PI/2;
    nodes.push({...p,type:"person",r:PR,x:cx+Math.cos(a)*pr,y:cy+Math.sin(a)*pr});
  });
  DOMAINS.forEach((d,i)=>{
    const a=(i/DOMAINS.length)*Math.PI*2-Math.PI/2+Math.PI/DOMAINS.length;
    nodes.push({...d,type:"domain",r:DR,x:cx+Math.cos(a)*dr*1.1,y:cy+Math.sin(a)*dr*1.1});
  });
}

function resize(){
  const nv=document.getElementById("network-view");
  W=canvas.width=nv.offsetWidth;H=canvas.height=nv.offsetHeight;
  initNodes();draw();
}

function getNode(id){return nodes.find(n=>n.id===id)}
function connected(id){const s=new Set();EDGES.forEach(([p,d])=>{if(p===id)s.add(d);if(d===id)s.add(p)});return s}

function draw(){
  ctx.clearRect(0,0,W,H);
  const conn=selectedId?connected(selectedId):null;
  EDGES.forEach(([pid,did,w])=>{
    const p=getNode(pid),d=getNode(did);if(!p||!d)return;
    const hl=conn&&(p.id===selectedId||d.id===selectedId);
    ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(d.x,d.y);
    if(hl){ctx.strokeStyle=w===2?"rgba(74,134,200,.9)":"rgba(74,134,200,.4)";ctx.lineWidth=w===2?2.5:1.5}
    else if(selectedId){ctx.strokeStyle="rgba(255,255,255,.04)";ctx.lineWidth=1}
    else{ctx.strokeStyle=w===2?"rgba(255,255,255,.2)":"rgba(255,255,255,.07)";ctx.lineWidth=w===2?1.8:1}
    ctx.stroke();
  });
  nodes.forEach(n=>{
    const sel=n.id===selectedId,con=conn&&conn.has(n.id),dim=selectedId&&!sel&&!con;
    ctx.globalAlpha=dim?.18:1;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r+(sel?3:0),0,Math.PI*2);
    if(sel){ctx.shadowColor=n.color;ctx.shadowBlur=20}else ctx.shadowBlur=0;
    ctx.fillStyle=sel?n.color:con?n.color+"cc":n.color+"55";ctx.fill();
    ctx.strokeStyle=sel?"#fff":con?"rgba(255,255,255,.6)":"rgba(255,255,255,.18)";
    ctx.lineWidth=sel?2:1;ctx.stroke();ctx.shadowBlur=0;
    ctx.fillStyle="#fff";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.font=`bold ${n.type==="person"?10:9}px -apple-system,sans-serif`;
    ctx.fillText(n.abbr,n.x,n.y);
    if(!dim){
      ctx.font=`${n.type==="person"?10:9}px -apple-system,sans-serif`;
      ctx.fillStyle=sel||con?"#d0dce8":"#4a6080";
      const lbl=n.label.length>17?n.label.slice(0,15)+"…":n.label;
      ctx.fillText(lbl,n.x,n.y+n.r+10);
    }
    ctx.globalAlpha=1;
  });
}

canvas.addEventListener("click",e=>{
  const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  let hit=null;nodes.forEach(n=>{if(Math.hypot(n.x-mx,n.y-my)<n.r+8)hit=n});
  if(hit){selectedId=hit.id===selectedId?null:hit.id;showDetail(selectedId?hit:null)}
  else{selectedId=null;showDetail(null)}
  draw();updateLists();
});
canvas.addEventListener("mousemove",e=>{
  const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  canvas.style.cursor=nodes.some(n=>Math.hypot(n.x-mx,n.y-my)<n.r+8)?"pointer":"default";
});

// ── Side lists ────────────────────────────────────────────────────────────────
function buildList(items,elId){
  const el=document.getElementById(elId);el.innerHTML="";
  items.forEach(item=>{
    const d=document.createElement("div");d.className="node-item"+(selectedId===item.id?" selected":"");
    d.innerHTML=`<div class="dot" style="background:${item.color}"></div><span>${item.label}</span>`;
    d.onclick=()=>{selectedId=item.id===selectedId?null:item.id;updateLists();showDetail(selectedId?item:null);draw()};
    el.appendChild(d);
  });
}
function updateLists(){buildList(PERSONS,"sb-persons");buildList(DOMAINS,"sb-domains")}

// ── Detail panel ─────────────────────────────────────────────────────────────
function showDetail(node){
  const el=document.getElementById("detail-panel");
  if(!node){el.innerHTML=`<div class="detail-empty"><div style="font-size:32px">🗺️</div><div>Click a stakeholder<br>or control domain<br>to see connections<br>and meeting reminders</div></div>`;return}
  const d=DETAIL[node.id];if(!d){el.innerHTML=`<div class="detail-empty"><div>${node.label}</div></div>`;return}
  const isP=node.type==="person";
  let html=`<div class="detail-name" style="color:${node.color}">${node.label}</div>`;
  html+=`<div class="detail-type">${isP?"Stakeholder":"Control Domain"}</div>`;
  if(d.domains?.length){
    html+=`<div class="dlbl">${isP?"Domains covered":"Connected domains"}</div><div class="chip-wrap">`;
    d.domains.forEach(did=>{const dn=DOMAINS.find(x=>x.id===did);if(dn)html+=`<span class="chip chip-d" onclick="selectNode('${dn.id}')">${dn.label}</span>`});
    html+=`</div>`;
  }
  if(d.persons?.length){
    html+=`<div class="dlbl">${isP?"Also coordinate with":"Key stakeholders"}</div><div class="chip-wrap">`;
    d.persons.forEach(pid=>{const pn=PERSONS.find(x=>x.id===pid);if(pn)html+=`<span class="chip chip-p" onclick="selectNode('${pn.id}')">${pn.label}</span>`});
    html+=`</div>`;
  }
  if(d.reminders?.length){
    html+=`<div class="dlbl">Meeting reminders</div>`;
    d.reminders.forEach(r=>{html+=`<div class="reminder ${r.t}"><span class="r-icon">${r.icon}</span><span>${r.text}</span></div>`});
  }
  el.innerHTML=html;
}

function selectNode(id){
  selectedId=id===selectedId?null:id;
  const node=[...PERSONS,...DOMAINS].find(x=>x.id===id);
  showDetail(selectedId?node:null);updateLists();draw();
}

// ── Matrix view ───────────────────────────────────────────────────────────────
function buildMatrix(){
  const t=document.getElementById("matrix-table");
  let h=`<tr><th style="padding:6px 12px;text-align:left;color:#3a5070;font-size:11px;border-bottom:1px solid #1e2d45;white-space:nowrap"></th>`;
  DOMAINS.forEach(d=>{h+=`<th style="padding:6px 7px;color:#7eb8f7;font-size:10px;writing-mode:vertical-rl;transform:rotate(180deg);border-bottom:1px solid #1e2d45;white-space:nowrap;max-height:80px">${d.label}</th>`});
  h+="</tr>";
  PERSONS.forEach(p=>{
    h+=`<tr><td style="padding:5px 12px;color:${p.color};font-size:11.5px;font-weight:600;white-space:nowrap;border-right:1px solid #1e2d45">${p.label}</td>`;
    DOMAINS.forEach(d=>{
      const e=EDGES.find(([pp,dd])=>pp===p.id&&dd===d.id);
      const cell=e?(e[2]===2
        ?`<div style="width:14px;height:14px;border-radius:3px;background:${p.color};opacity:.9;margin:auto" title="Primary"></div>`
        :`<div style="width:14px;height:14px;border-radius:3px;border:2px solid ${p.color};margin:auto;opacity:.6" title="Secondary"></div>`)
        :`<div style="width:14px;height:14px;border-radius:3px;background:#1a2438;margin:auto"></div>`;
      h+=`<td style="padding:4px 5px;text-align:center;border-bottom:1px solid #0f1623">${cell}</td>`;
    });
    h+="</tr>";
  });
  t.innerHTML=h;
}

// ── Mode switch ───────────────────────────────────────────────────────────────
function setMode(m){
  mode=m;
  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.toggle("active",b.textContent.toLowerCase()===m));
  document.getElementById("network-view").style.display=m==="network"?"block":"none";
  document.getElementById("matrix-view").style.display=m==="matrix"?"block":"none";
  if(m==="matrix")buildMatrix();
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener("resize",()=>{resize()});
resize();updateLists();
</script>
</body>
</html>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f1623;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}
/* ── Standard nav bar (matches Module A / B) ─── */
.nav{background:#1a2035;color:#fff;display:flex;align-items:center;gap:10px;padding:12px 24px;font-size:14px;flex-shrink:0;border-bottom:1px solid #1e2d45}
.nav .logo{font-weight:700;font-size:16px;color:#7eb8f7;text-decoration:none}
.nav .sep{color:#4a5568;margin:0 2px}
.nav .back-link{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:6px;border:1px solid #3a4d70;background:#2d3a55;color:#94b8d8;font-size:12px;font-weight:600;text-decoration:none;transition:all .15s}
.nav .back-link:hover{background:#3a4d70;color:#fff}
.nav .page-title{color:#cbd5e1;font-size:13px}
.nav .engagement{font-size:11px;color:#64748b;border-left:1px solid #334155;padding-left:12px;margin-left:4px}
.nav .badge{background:#2d3a55;border:1px solid #3a4d70;border-radius:4px;padding:2px 8px;font-size:11px;color:#a0b4d0}
/* ── Context banner (from Module B) ─────────── */
.ctx-banner{display:none;align-items:center;gap:10px;padding:8px 24px;background:#1e2d45;border-bottom:1px solid #2a3d60;font-size:12px;color:#7eb8f7;flex-shrink:0}
.ctx-banner .ctx-icon{font-size:14px}
.ctx-banner .ctx-text{flex:1}
.ctx-banner .ctx-back{padding:3px 10px;border-radius:5px;border:1px solid #3a5070;background:transparent;color:#5a8aaa;font-size:11px;cursor:pointer;text-decoration:none;transition:all .12s}
.ctx-banner .ctx-back:hover{background:#1e3a5a;color:#7eb8f7}
/* ── Progress strip ──────────────────────────── */
.overall-prog{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11px;color:#5a7090}
.prog-bar-wrap{width:120px;height:6px;background:#334155;border-radius:3px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,#4a86c8,#2d5fa0);border-radius:3px;transition:width .4s}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:210px;background:#111926;border-right:1px solid #1e2d45;overflow-y:auto;flex-shrink:0}
.sb-section{padding:10px 0}
.sb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#3a5070;padding:0 12px 6px}
.sb-item{padding:8px 12px;cursor:pointer;border-left:3px solid transparent;transition:all .12s;display:flex;flex-direction:column;gap:3px}
.sb-item:hover{background:#1a2438}
.sb-item.active{background:#182540;border-left-color:#4a86c8}
.sb-item-top{display:flex;align-items:center;gap:7px}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-name{font-size:12.5px;font-weight:600;flex:1}
.sb-prog-row{display:flex;align-items:center;gap:6px;padding-left:15px}
.sb-mini-bar{flex:1;height:3px;background:#1e2d45;border-radius:2px;overflow:hidden}
.sb-mini-fill{height:100%;border-radius:2px;transition:width .3s}
.sb-pct{font-size:10px;color:#4a6080;width:26px;text-align:right}
.main{flex:1;overflow-y:auto;padding:20px 24px}
.meeting-header{margin-bottom:20px}
.mh-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.mh-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.mh-name{font-size:18px;font-weight:700;margin-bottom:2px}
.mh-sub{font-size:12px;color:#5a7090}
.mh-domains{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.domain-chip{padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:600;background:#1e2d45;color:#7eb8f7;border:1px solid #2a3d55}
.domain-chip.new-chip{background:#1e3820;color:#4ade80;border-color:#2a5030}
.section{margin-bottom:22px}
.section-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #1a2438}
.section-icon{font-size:14px}
.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#5a7090}
.section-count{margin-left:auto;font-size:11px;padding:1px 7px;border-radius:8px;background:#1e2d45;color:#5a7090}
.section-count.s-done{background:#1e3820;color:#4ade80}
.qcard{background:#141d2e;border:1px solid #1e2d45;border-radius:8px;margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.qcard.status-asked{border-left:3px solid #4ade80}
.qcard.status-noted{border-left:3px solid #f59e0b}
.qcard.status-pending{border-left:3px solid #374151}
.qcard-top{display:flex;align-items:flex-start;gap:10px;padding:10px 12px}
.status-circle{width:18px;height:18px;border-radius:50%;border:2px solid #2a3d55;background:transparent;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;transition:all .15s;flex-shrink:0;margin-top:1px}
.status-circle.done{background:#4ade80;border-color:#4ade80;color:#000}
.status-circle.noted{background:#f59e0b;border-color:#f59e0b;color:#000}
.qcard-body{flex:1}
.qcard-q{font-size:13px;line-height:1.5;color:#d0dce8}
.qcard-meta{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap}
.qmeta-tag{font-size:10px;padding:1px 7px;border-radius:8px;font-weight:600}
.tag-prior{background:#2a2520;color:#b08050;border:1px solid #3a3020;opacity:.7}
.tag-new{background:#1e3820;color:#4ade80;border:1px solid #2a5030}
.tag-cross{background:#1e2a40;color:#7eb8f7;border:1px solid #2a3a55}
.tag-risk{background:#3a1e1e;color:#f87171;border:1px solid #5a2a2a}
.prior-note{margin-top:6px;padding:6px 10px;background:#1a1810;border-radius:5px;border-left:2px solid #7a5020;font-size:11.5px;color:#a08060;line-height:1.5}
.prior-note-lbl{font-size:10px;font-weight:700;color:#7a5020;margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px}
.cross-note{margin-top:6px;padding:6px 10px;background:#1a2030;border-radius:5px;border-left:2px solid #4a6090;font-size:11.5px;color:#7a9ab8;line-height:1.5}
.cross-note-lbl{font-size:10px;font-weight:700;color:#4a6090;margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px}
.qcard-actions{display:flex;gap:6px;padding:0 12px 8px 40px}
.act-btn{padding:3px 10px;border-radius:5px;border:1px solid #2a3d55;background:transparent;color:#5a7090;font-size:11px;cursor:pointer;transition:all .12s}
.act-btn:hover{background:#1e2d45;color:#e2e8f0}
.act-btn.active-ask{background:#1e3820;border-color:#4ade80;color:#4ade80}
.act-btn.active-noted{background:#3a2e10;border-color:#f59e0b;color:#f59e0b}
.note-area{margin:0 12px 10px 40px}
.note-area textarea{width:100%;background:#0f1623;border:1px solid #2a3d55;border-radius:6px;color:#d0dce8;font-size:12px;padding:8px;resize:vertical;min-height:60px;font-family:inherit;line-height:1.5}
.note-area textarea:focus{outline:none;border-color:#4a86c8}
.note-area textarea::placeholder{color:#2a3d55}
.empty-state{text-align:center;padding:60px 20px;color:#2a3d55}
.empty-state div:first-child{font-size:36px;margin-bottom:12px}

<script>
/* ── Read URL params from Module B and show context banner ── */
(function(){
  const p = new URLSearchParams(window.location.search);
  const person = p.get('person'), sys = p.get('sys'), area = p.get('area');
  const sysLabels = {sap:'SAP S/4HANA',oracle:'Oracle EBS',workday:'Workday',servicenow:'ServiceNow',azuread:'Azure AD'};

  if(person || sys || area){
    const banner = document.getElementById('ctx-banner');

const MEETINGS=[

const state={};
MEETINGS.forEach(m=>m.questions.forEach(q=>{state[q.id]={status:"pending",note:""}}));
let currentId=null;
function getProgress(mid){const m=MEETINGS.find(x=>x.id===mid);const done=m.questions.filter(q=>state[q.id].status==="asked"||state[q.id].status==="noted").length;return{done,total:m.questions.length,pct:Math.round(done/m.questions.length*100)}}
function getOverall(){let done=0,total=0;MEETINGS.forEach(m=>{const p=getProgress(m.id);done+=p.done;total+=p.total});return{done,total,pct:total?Math.round(done/total*100):0}}
function renderSidebar(){const el=document.getElementById("sb-persons");el.innerHTML="";MEETINGS.forEach(m=>{const p=getProgress(m.id);const div=document.createElement("div");div.className="sb-item"+(currentId===m.id?" active":"");div.innerHTML=`<div class="sb-item-top"><div class="sb-dot" style="background:${m.color}"></div><div style="flex:1;min-width:0"><span class="sb-name">${m.name}</span><div style="font-size:10px;color:#4a6080;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.role}</div></div><span style="font-size:10px;color:#3a5070;flex-shrink:0">${p.done}/${p.total}</span></div><div class="sb-prog-row"><div class="sb-mini-bar"><div class="sb-mini-fill" style="width:${p.pct}%;background:${m.color}88"></div></div><span class="sb-pct">${p.pct}%</span></div>`;div.onclick=()=>{currentId=m.id;renderSidebar();renderMain()};el.appendChild(div)});const ov=getOverall();document.getElementById("overall-label").textContent=`${ov.done} / ${ov.total} covered`;document.getElementById("overall-bar").style.width=ov.pct+"%";document.getElementById("overall-pct").textContent=ov.pct+"%"}
function renderMain(){const panel=document.getElementById("main-panel");if(!currentId){panel.innerHTML=`<div class="empty-state"><div>📋</div><div>Select a stakeholder to begin</div></div>`;return}const m=MEETINGS.find(x=>x.id===currentId);const p=getProgress(m.id);const prior=m.questions.filter(q=>q.type!=="new");const newQs=m.questions.filter(q=>q.type==="new");const orgBadge=m.org==="ACME Corp"?`<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:#1e2d45;color:#7a9ab8;font-weight:600">${m.org}</span>`:`<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:#1a0a30;color:#c4b5fd;font-weight:600">${m.org} (Third Party)</span>`;let html=`<div class="meeting-header"><div class="mh-top"><div class="mh-icon" style="background:${m.color}22;border:1px solid ${m.color}44">${m.icon}</div><div><div class="mh-name">${m.name}</div><div style="font-size:12px;color:#5a7090;margin-bottom:5px">${m.role} · ${orgBadge}</div><div class="mh-sub">${p.done} of ${p.total} questions covered · ${p.pct}% complete</div><div class="mh-domains">${m.domains.map(d=>`<span class="domain-chip${m.newDomains.includes(d)?" new-chip":""}">${m.newDomains.includes(d)?"🆕 ":""}${d}</span>`).join("")}</div></div></div></div>`;
if(newQs.length){const dn=newQs.filter(q=>state[q.id].status==="asked"||state[q.id].status==="noted").length;html+=`<div class="section"><div class="section-head"><span class="section-icon">🆕</span><span class="section-title">New this year</span><span class="section-count ${dn===newQs.length?"s-done":""}">${dn}/${newQs.length}</span></div>${newQs.map(q=>renderCard(q)).join("")}</div>`}
const dp=prior.filter(q=>state[q.id].status==="asked"||state[q.id].status==="noted").length;html+=`<div class="section"><div class="section-head"><span class="section-icon">📂</span><span class="section-title">Carry-over from prior year</span><span class="section-count ${dp===prior.length?"s-done":""}">${dp}/${prior.length}</span></div>${prior.map(q=>renderCard(q)).join("")}</div>`;panel.innerHTML=html;panel.querySelectorAll(".act-btn").forEach(btn=>{btn.onclick=e=>{e.stopPropagation();cycleStatus(btn.dataset.qid,btn.dataset.action)}});panel.querySelectorAll("textarea").forEach(ta=>{ta.oninput=()=>{state[ta.dataset.qid].note=ta.value;renderSidebar()}})}
function renderCard(q){const s=state[q.id];const tags=(q.tags||[]).map(t=>t==="new"?`<span class="qmeta-tag tag-new">🆕 new this year</span>`:t==="risk"?`<span class="qmeta-tag tag-risk">⚠️ prior finding</span>`:t==="cross"?`<span class="qmeta-tag tag-cross">🔗 cross-domain</span>`:"").join("");const sc=s.status==="asked"?"status-asked":s.status==="noted"?"status-noted":"status-pending";const cc=s.status==="asked"?"done":s.status==="noted"?"noted":"";const ct=s.status==="asked"?"✓":s.status==="noted"?"📝":"";const ph=q.priorNote?`<div class="prior-note"><div class="prior-note-lbl">Prior year note</div>${q.priorNote}</div>`:"";const ch=q.crossNote?`<div class="cross-note"><div class="cross-note-lbl">Cross-domain</div>${q.crossNote}</div>`:"";const na=`<div class="note-area" id="nota-${q.id}" style="${s.note?"display:block":"display:none"}"><textarea data-qid="${q.id}" placeholder="Type notes here…">${s.note}</textarea></div>`;return`<div class="qcard ${sc}" id="qcard-${q.id}"><div class="qcard-top"><div class="status-circle ${cc}">${ct}</div><div class="qcard-body"><div class="qcard-q">${q.q}</div><div class="qcard-meta"><span class="qmeta-tag tag-prior">${q.domain}</span>${tags}</div>${ph}${ch}</div></div><div class="qcard-actions"><button class="act-btn ${s.status==="asked"?"active-ask":""}" data-qid="${q.id}" data-action="asked">✓ Asked</button><button class="act-btn ${s.status==="noted"?"active-noted":""}" data-qid="${q.id}" data-action="noted">📝 Note</button><button class="act-btn" data-qid="${q.id}" data-action="reset">Reset</button></div>${na}</div>`}
function cycleStatus(qid,action){const s=state[qid];if(action==="asked"){s.status=s.status==="asked"?"pending":"asked"}else if(action==="noted"){s.status=s.status==="noted"?"pending":"noted";const na=document.getElementById("nota-"+qid);if(na)na.style.display=s.status==="noted"?"block":"none"}else{s.status="pending";s.note=""}renderSidebar();renderMain()}
// Auto-select person from URL param (passed from Module B walkthrough links)
if(window._ctxPerson && MEETINGS.find(m=>m.id===window._ctxPerson)){
  currentId = window._ctxPerson;
}
renderSidebar();
renderMain();
</script>
</body>
</html>
